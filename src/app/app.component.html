<app-navbar></app-navbar>

<main>
  <!-- Hero con CTA principale -->
  <app-hero id="home"></app-hero>

  <!-- Barra numeri di fiducia (5★ · 20+ specialisti · 24h · Sorso) -->
  <app-trust-bar></app-trust-bar>

  <!-- Griglia servizi a mosaico -->
  <app-servizi id="servizi"></app-servizi>

  <!-- Come funziona (3 passi) -->
  <app-come-funziona></app-come-funziona>

  <!-- Lista specialità + vantaggi -->
  <app-visite-specialistiche id="specialisti"></app-visite-specialistiche>

  <!-- Barra info: contatti + orari -->
  <app-info-bar></app-info-bar>

  <!-- Chi siamo -->
  <app-chi-siamo id="chi-siamo"></app-chi-siamo>

  <!-- Galleria fotografica struttura -->
  <section class="galleria-wrap">
    <div class="container">
      <div class="section-header">
        <span class="section-label">La struttura</span>
        <h2 class="section-title">I nostri spazi</h2>
        <div class="title-underline"></div>
      </div>
      <div class="galleria-grid">
        <div class="galleria-item galleria-item--wide">
          <img src="assets/foto/corridoio.jpg" alt="Ingresso AFlab Centro Medico" loading="lazy">
        </div>
        <div class="galleria-item">
          <img src="assets/foto/sala-visite.jpg" alt="Sala visite" loading="lazy">
        </div>
        <div class="galleria-item">
          <img src="assets/foto/studio-1.jpg" alt="Studio medico" loading="lazy">
        </div>
        <div class="galleria-item">
          <img src="assets/foto/studio-2.jpg" alt="Studio specialistico" loading="lazy">
        </div>
        <div class="galleria-item">
          <img src="assets/foto/sala-specialistica.jpg" alt="Sala specialistica" loading="lazy">
        </div>
        <div class="galleria-item galleria-item--wide">
          <img src="assets/foto/poltrona.jpg" alt="Studio AFlab Centro Medico" loading="lazy">
        </div>
        <div class="galleria-item">
          <img src="assets/foto/lettino.jpg" alt="Lettino visita AFlab Centro Medico" loading="lazy">
        </div>
      </div>
    </div>
  </section>

  <!-- Team -->
  <app-team id="team"></app-team>

  <!-- Recensioni Google Maps -->
  <app-recensioni id="recensioni"></app-recensioni>

  <!-- CTA finale: Prenota + TELEFONO/WHATSAPP -->
  <app-cta-finale></app-cta-finale>

  <!-- Contatti / Prenota -->
  <app-contatti id="contatti"></app-contatti>

</main>

<app-footer></app-footer>

<!-- Floating CTA bar: visibile solo su mobile -->
<app-floating-cta></app-floating-cta>
