<!-- Barra superiore scura -->
<div class="topbar">
  <div class="topbar__inner container">
    <div class="topbar__info">
      <span class="topbar__item">
        <mat-icon>phone</mat-icon>
        <a href="tel:+390702079940">070 2079940</a>
        <span class="topbar__sep">·</span>
        <a href="tel:+393391969098">339 196 9098</a>
        <span class="topbar__sub">INFO &amp; APPUNTAMENTI</span>
      </span>
      <span class="topbar__item">
        <mat-icon>schedule</mat-icon>
        <span>PRELIEVI &nbsp;<strong>06:30–09:30</strong> &nbsp;·&nbsp; CENTRO &nbsp;<strong>09:00–19:30</strong> &nbsp;·&nbsp; Sab/Dom <strong>Chiuso</strong></span>
      </span>
    </div>
    <button mat-raised-button class="btn-primary topbar__cta" (click)="scrollTo('contatti')">
      PRENOTA UNA VISITA
    </button>
  </div>
</div>

<!-- Navbar principale (bianca) -->
<header class="navbar" [class.scrolled]="scrolled">
  <div class="navbar__inner container">

    <!-- Logo -->
    <div class="navbar__logo" (click)="scrollTo('home')">
      <img src="assets/aflab-logo.svg" alt="AFlab Centro Medico" class="navbar__logo-img">
    </div>

    <!-- Desktop nav -->
    <nav class="navbar__links">
      <a
        *ngFor="let link of navLinks"
        class="nav-link"
        (click)="scrollTo(link.anchor)"
      >{{ link.label }}</a>
    </nav>

    <!-- Hamburger mobile -->
    <button mat-icon-button class="navbar__hamburger" (click)="toggleMobile()">
      <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>
  </div>

  <!-- Mobile drawer -->
  <div class="mobile-menu" [class.open]="mobileMenuOpen">
    <a
      *ngFor="let link of navLinks"
      class="mobile-link"
      (click)="scrollTo(link.anchor)"
    >{{ link.label }}</a>
    <div class="mobile-cta-row">
      <button mat-raised-button class="btn-primary" (click)="scrollTo('contatti')">
        <mat-icon>calendar_today</mat-icon> Prenota una visita
      </button>
    </div>
  </div>
</header>
